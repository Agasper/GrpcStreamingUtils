syntax = "proto3";
package grpc_streaming_utils;
option csharp_namespace = "Niarru.GrpcStreamingUtils.Rpc";
import "google/protobuf/any.proto";

message RequestEnvelope {
  string request_id = 1;
  google.protobuf.Any payload = 2;
}

message ResponseEnvelope {
  string in_reply_to_request_id = 1;
  int32 status = 2;
  string error = 3;
  google.protobuf.Any payload = 4;
}
