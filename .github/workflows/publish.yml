name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - run: dotnet restore

      - run: dotnet build -c Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }}

      - run: dotnet test -c Release --no-build

      - run: dotnet pack src/GrpcStreamingUtils/GrpcStreamingUtils.csproj -c Release --no-build -p:PackageId=Niarru.GrpcStreamingUtils -p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkg

      - run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
